<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>MindWork AI Studio</title>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #ffffff;
            }

            img {
                display: block;
            }

            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
            }

            p {
                margin: 0;
                font-family: Helvetica, "Helvetica Neue", Arial, sans-serif;
                font-size: 80px;
                font-weight: 700;
                letter-spacing: 0;
                color: #333333;
            }

            @media (prefers-color-scheme: dark) {
                html, body {
                    background-color: #1a1a1a;
                }

                p {
                    color: #cccccc;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img src="icon.png" width="512" height="512" alt="The app logo">
            <p>MindWork AI Studio</p>
        </div>
    </body>
</html>
